# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

[graph]
# Only check the default feature set for each crate.
all-features = false

# ── Advisories ────────────────────────────────────────────────────────────────
[advisories]
# Deny crates with known security vulnerabilities.
version = 2
unmaintained = "workspace"
yanked = "warn"

# ── Licences ──────────────────────────────────────────────────────────────────
[licenses]
version = 2
# Confidence threshold for licence detection (0.0 – 1.0).
confidence-threshold = 0.8
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "CC0-1.0",
    "Zlib",
    "MPL-2.0",
    "AGPL-3.0-only",
    "CDLA-Permissive-2.0",
]

# ── Banned crates ─────────────────────────────────────────────────────────────
[bans]
# Warn on duplicate versions of the same crate; bump to "deny" once the
# dependency tree is tidy.
multiple-versions = "warn"
wildcards = "allow"
deny = []

# ── Sources ───────────────────────────────────────────────────────────────────
[sources]
# Only allow crates published to crates.io.
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
