changelog:
  exclude:
    labels:
      - ignore-for-release
  categories:
    - title: "What's New"
      labels:
        - enhancement
        - feature
    - title: "Bug Fixes"
      labels:
        - bug
        - fix
    - title: "Performance"
      labels:
        - performance
    - title: "Internal"
      labels:
        - chore
        - ci
        - deps
        - refactor
