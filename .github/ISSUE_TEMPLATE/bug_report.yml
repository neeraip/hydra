name: Bug Report
description: Something produces incorrect results or crashes.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Please search existing issues before filing. Include a minimal reproducer where possible.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What went wrong? What did you expect instead?
    validations:
      required: true

  - type: textarea
    id: reproducer
    attributes:
      label: Reproducer
      description: Minimal `.inp` file or code snippet that triggers the bug.
      render: text
    validations:
      required: false

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Rust version, Hydra version.
      placeholder: |
        OS: macOS 14.5
        Rust: 1.88.0
        Hydra: 0.1.0
    validations:
      required: true
