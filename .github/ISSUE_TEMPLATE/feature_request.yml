name: Feature Request
description: Propose a new capability or improvement.
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Check the [open issues](https://github.com/neeraip/hydra/issues) and [discussions](https://github.com/neeraip/hydra/discussions) first.

  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What are you trying to do that you currently can't?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like Hydra to do?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or alternative approaches you've thought about?
    validations:
      required: false
