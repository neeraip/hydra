name: CodeQL

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  analyze-js:
    name: Analyze (javascript-typescript)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:javascript-typescript

  analyze-rust:
    name: Analyze (rust)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1.17.0
        with:
          cache: false

      # No Swatinem/rust-cache here deliberately: CodeQL's Rust extractor
      # works by tracing actual rustc invocations during the build. Restoring
      # cached compiled artifacts skips those invocations for dependency
      # crates, so CodeQL never observes them — producing the "Low Rust
      # analysis quality" warning (call targets/types unresolved for anything
      # that came from cache instead of a real compile). This job only runs
      # weekly, so the extra build time is worth it for a complete trace.

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: rust

      - name: Build
        run: cargo build --workspace

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:rust
