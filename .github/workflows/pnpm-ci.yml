name: PNPM CI

on:
  push:
    branches: [main]
    paths:
      - 'crates/gui/frontend/**'
      - '.github/workflows/pnpm-ci.yml'
  pull_request:
    paths:
      - 'crates/gui/frontend/**'
      - '.github/workflows/pnpm-ci.yml'

concurrency:
  group: pnpm-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    name: PNPM CI
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: crates/gui/frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 1

      - name: Install pnpm
        uses: pnpm/action-setup@v6.0.8
        with:
          version: 10

      - name: Install Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          cache: 'pnpm'
          cache-dependency-path: crates/gui/frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check
        run: pnpm exec tsc --noEmit

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Run tests
        run: pnpm test
