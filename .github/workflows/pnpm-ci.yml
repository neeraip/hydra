name: PNPM CI

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: pnpm-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 1
      - name: Check for frontend changes
        id: filter
        env:
          BASE: ${{ github.event.pull_request.base.sha }}
        run: |
          git fetch --depth=1 origin "$BASE"
          if git diff --name-only "$BASE" HEAD | grep -qE '^crates/gui/frontend/'; then
            echo "frontend=true" >> "$GITHUB_OUTPUT"
          else
            echo "frontend=false" >> "$GITHUB_OUTPUT"
          fi

  check:
    name: PNPM CI
    needs: changes
    if: |
      always() && (
        needs.changes.outputs.frontend == 'true' ||
        github.event_name == 'workflow_dispatch'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: crates/gui/frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 1

      - name: Install pnpm
        uses: pnpm/action-setup@v6.0.9
        with:
          version: 10

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'
          cache-dependency-path: crates/gui/frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check
        run: pnpm exec tsc --noEmit

      - name: Lint
        run: pnpm lint

      - name: Regenerate CRS catalog
        working-directory: ${{ github.workspace }}
        run: node scripts/update-crs-catalog.mjs

      - name: Check CRS catalog is up to date
        working-directory: ${{ github.workspace }}
        run: git diff --exit-code -- crates/gui/frontend/public/crs-catalog.json

      - name: Build
        run: pnpm build

      - name: Run tests
        run: pnpm test
