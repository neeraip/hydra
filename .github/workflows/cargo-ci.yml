name: Cargo CI

on:
  push:
    paths:
      - 'crates/**/*.rs'
      - 'crates/**/Cargo.toml'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'deny.toml'
      - '.github/workflows/cargo-ci.yml'
  pull_request:
    paths:
      - 'crates/**/*.rs'
      - 'crates/**/Cargo.toml'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'deny.toml'
      - '.github/workflows/cargo-ci.yml'

concurrency:
  group: cargo-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    name: Cargo CI
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      CARGO_TERM_COLOR: always

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4  # v4.2.2
        with:
          fetch-depth: 1

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1  # v1.11.0

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2  # v2.8.0

      - name: Check dependencies (cargo-deny)
        uses: EmbarkStudios/cargo-deny-action@v2  # v2.0.12

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Lint (clippy)
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Run tests
        run: cargo test --workspace --all-targets --locked
