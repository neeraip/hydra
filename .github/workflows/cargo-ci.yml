name: Cargo CI

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: cargo-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    outputs:
      cargo: ${{ steps.filter.outputs.cargo }}
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 1
      - name: Check for Cargo-related changes
        id: filter
        env:
          BASE: ${{ github.event.pull_request.base.sha }}
        run: |
          git fetch --depth=1 origin "$BASE"
          if git diff --name-only "$BASE" HEAD \
            | grep -qE '\.rs$|Cargo\.toml$|^Cargo\.lock$|^deny\.toml$|^rust-toolchain\.toml$'; then
            echo "cargo=true" >> "$GITHUB_OUTPUT"
          else
            echo "cargo=false" >> "$GITHUB_OUTPUT"
          fi

  check:
    name: Cargo CI
    needs: changes
    if: |
      always() && (
        needs.changes.outputs.cargo == 'true' ||
        github.event_name == 'workflow_dispatch'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      CARGO_TERM_COLOR: always

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 1

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1.17.0
        with:
          cache: false

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2.9.1

      - name: Check dependencies (cargo-deny)
        uses: EmbarkStudios/cargo-deny-action@v2.1.1

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Lint (clippy)
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Check documentation
        run: cargo doc --workspace --no-deps
        env:
          RUSTDOCFLAGS: -D warnings

      - name: Run tests
        run: cargo test --workspace --all-targets --locked
