name: Cargo CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: cargo-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    outputs:
      cargo: ${{ steps.filter.outputs.cargo }}
    steps:
      - uses: actions/checkout@v7.0.1
        with:
          fetch-depth: 1
      - name: Check for Cargo-related changes
        id: filter
        env:
          BASE: ${{ github.event.pull_request.base.sha }}
        run: |
          git fetch --depth=1 origin "$BASE"
          if git diff --name-only "$BASE" HEAD \
            | grep -qE '\.rs$|Cargo\.toml$|^Cargo\.lock$|^deny\.toml$|^rust-toolchain\.toml$'; then
            echo "cargo=true" >> "$GITHUB_OUTPUT"
          else
            echo "cargo=false" >> "$GITHUB_OUTPUT"
          fi

  # Lint, formatting, docs, and dependency checks are platform-independent —
  # run them once on Ubuntu rather than repeating them per-OS.
  lint:
    name: Lint
    needs: changes
    # Pushes to main and manual dispatches always run the full suite; the
    # change filter only gates pull requests.
    if: |
      always() && (
        needs.changes.outputs.cargo == 'true' ||
        github.event_name == 'push' ||
        github.event_name == 'workflow_dispatch'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      CARGO_TERM_COLOR: always

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.1
        with:
          fetch-depth: 1

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1.17.0
        with:
          cache: false

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2.9.1

      - name: Check dependencies (cargo-deny)
        uses: EmbarkStudios/cargo-deny-action@v2.1.1

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Lint (clippy)
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Check documentation
        run: cargo doc --workspace --no-deps
        env:
          RUSTDOCFLAGS: -D warnings

  test:
    name: Test / ${{ matrix.os }}
    needs: changes
    # Pushes to main and manual dispatches always run the full suite; the
    # change filter only gates pull requests.
    if: |
      always() && (
        needs.changes.outputs.cargo == 'true' ||
        github.event_name == 'push' ||
        github.event_name == 'workflow_dispatch'
      )
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    env:
      CARGO_TERM_COLOR: always

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.1
        with:
          fetch-depth: 1

      - name: Install Tauri system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1.17.0
        with:
          cache: false

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2.9.1

      - name: Run tests
        run: cargo test --workspace --all-targets --locked

  # Forward-compatibility canary: the workspace pins the MSRV toolchain via
  # rust-toolchain.toml, so nothing else exercises the latest stable compiler.
  # Non-blocking — breakage here is an early warning, never a merge blocker.
  test-stable:
    name: Test / latest stable (non-blocking)
    needs: changes
    if: |
      always() && (
        needs.changes.outputs.cargo == 'true' ||
        github.event_name == 'push' ||
        github.event_name == 'workflow_dispatch'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 30
    continue-on-error: true

    env:
      CARGO_TERM_COLOR: always

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.1
        with:
          fetch-depth: 1

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Rust toolchain (pinned, for rustup)
        uses: actions-rust-lang/setup-rust-toolchain@v1.17.0
        with:
          cache: false

      - name: Install latest stable toolchain
        run: rustup toolchain install stable --profile minimal

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2.9.1
        with:
          key: stable

      - name: Run tests (latest stable)
        run: cargo +stable test --workspace --all-targets --locked
