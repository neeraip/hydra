name: Scripts CI

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: scripts-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    outputs:
      scripts: ${{ steps.filter.outputs.scripts }}
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 1
      - name: Check for scripts changes
        id: filter
        env:
          BASE: ${{ github.event.pull_request.base.sha }}
        run: |
          git fetch --depth=1 origin "$BASE"
          if git diff --name-only "$BASE" HEAD | grep -qE '^scripts/'; then
            echo "scripts=true" >> "$GITHUB_OUTPUT"
          else
            echo "scripts=false" >> "$GITHUB_OUTPUT"
          fi

  test:
    name: Scripts CI
    needs: changes
    if: |
      always() && (
        needs.changes.outputs.scripts == 'true' ||
        github.event_name == 'workflow_dispatch'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 1

      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Run Python script tests
        run: python3 -m unittest discover -s scripts/tests -p "test_*.py" -v
