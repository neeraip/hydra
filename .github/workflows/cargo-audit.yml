name: Cargo Audit

on:
  pull_request:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    outputs:
      lockfile: ${{ steps.filter.outputs.lockfile }}
    steps:
      - uses: actions/checkout@v7.0.1
        with:
          fetch-depth: 1
      - name: Check for Cargo.lock changes
        id: filter
        env:
          BASE: ${{ github.event.pull_request.base.sha }}
        run: |
          git fetch --depth=1 origin "$BASE"
          if git diff --name-only "$BASE" HEAD | grep -qE '^Cargo\.lock$'; then
            echo "lockfile=true" >> "$GITHUB_OUTPUT"
          else
            echo "lockfile=false" >> "$GITHUB_OUTPUT"
          fi

  audit:
    name: Cargo Audit
    needs: changes
    if: |
      always() && (
        needs.changes.outputs.lockfile == 'true' ||
        github.event_name != 'pull_request'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v7.0.1
        with:
          fetch-depth: 1

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@v1.21.0

      - name: Install cargo-audit
        run: cargo binstall cargo-audit --no-confirm

      - name: Audit dependencies
        run: cargo audit
