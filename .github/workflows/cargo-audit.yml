name: Cargo Audit

on:
  push:
    branches: [main]
    paths:
      - Cargo.lock
  pull_request:
    paths:
      - Cargo.lock
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    name: Cargo Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 1

      - uses: cargo-bins/cargo-binstall@v1.20.0

      - name: Install cargo-audit
        run: cargo binstall cargo-audit --no-confirm

      - name: Audit dependencies
        run: cargo audit
