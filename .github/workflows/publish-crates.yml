name: Publish Crates

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'cli-v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: read

jobs:
  publish:
    name: Publish Crates
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      CARGO_TERM_COLOR: always

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1.11.0
        with:
          cache: false

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@v1.20.0

      - name: Install cargo-release
        run: cargo binstall cargo-release --version "=1.1.2" --no-confirm

      - name: Publish library crates (v* tag)
        if: startsWith(github.ref_name, 'v')
        run: cargo release publish -p hydra-common -p hydra-engine -p hydra-sdk --execute --no-confirm
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish CLI crate (cli-v* tag)
        if: startsWith(github.ref_name, 'cli-v')
        run: cargo release publish -p hydra-cli --execute --no-confirm
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
