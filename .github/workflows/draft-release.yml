name: Draft Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'cli-v[0-9]+.[0-9]+.[0-9]+'
      - 'gui-v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

# Never cancel a release in flight.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:

  # ── 1. Create an empty draft release to collect assets into. ─────────────
  prepare-release:
    name: Create Draft Release
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 1

      - name: Create draft release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ "${{ github.ref_name }}" == cli-v* ]]; then
            title="Hydra CLI ${GITHUB_REF_NAME#cli-}"
          elif [[ "${{ github.ref_name }}" == gui-v* ]]; then
            title="Hydra GUI ${GITHUB_REF_NAME#gui-}"
          else
            title="Hydra Library ${GITHUB_REF_NAME}"
          fi
          gh release create "${{ github.ref_name }}" \
            --draft \
            --generate-notes \
            --title "${title}"

  # ── 2. Build the CLI binary for each target and attach it. ───────────────
  cli:
    name: CLI / ${{ matrix.target }}
    needs: prepare-release
    if: startsWith(github.ref_name, 'cli-v')
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30

    env:
      CARGO_TERM_COLOR: always

    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: x86_64-unknown-linux-gnu,  runner: ubuntu-latest,  cross: false }
          - { target: aarch64-unknown-linux-gnu, runner: ubuntu-latest,  cross: true  }
          - { target: x86_64-pc-windows-msvc,   runner: windows-latest, cross: false }
          # - { target: x86_64-apple-darwin, runner: macos-13, cross: false }  # macos-13 runner unavailable
          - { target: aarch64-apple-darwin,      runner: macos-latest,   cross: false }

    steps:
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 1

      - uses: actions-rust-lang/setup-rust-toolchain@v1.11.0
        with:
          target: ${{ matrix.target }}
          cache: false

      - uses: Swatinem/rust-cache@v2.9.1

      - uses: cargo-bins/cargo-binstall@v1.20.1
        if: matrix.cross

      - name: Install cross
        if: matrix.cross
        run: cargo binstall cross --no-confirm

      - name: Build (native)
        if: ${{ !matrix.cross }}
        run: cargo build --release --locked -p hydra-cli --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --locked -p hydra-cli --target ${{ matrix.target }}

      - name: Archive (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#cli-v}"
          bin="target/${{ matrix.target }}/release/hydra"
          archive="hydra-cli-${version}-${{ matrix.target }}.tar.gz"
          tar -czf "${archive}" -C "$(dirname "${bin}")" "$(basename "${bin}")"
          echo "ARCHIVE=${archive}" >> "${GITHUB_ENV}"

      - name: Archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF_NAME -replace '^cli-v', ''
          $archive = "hydra-cli-${version}-${{ matrix.target }}.zip"
          Compress-Archive -Path "target/${{ matrix.target }}/release/hydra.exe" -DestinationPath $archive
          "ARCHIVE=${archive}" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload to release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.ref_name }}" "${{ env.ARCHIVE }}"

  # ── 3. Build the Tauri desktop app and attach platform installers. ────────
  gui:
    name: GUI / ${{ matrix.platform }}
    needs: prepare-release
    if: startsWith(github.ref_name, 'gui-v')
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        include:
          # - { platform: macOS-x86_64, runner: macos-13, target: x86_64-apple-darwin }  # macos-13 runner unavailable
          - { platform: macOS-aarch64,  runner: macos-latest,   target: aarch64-apple-darwin     }
          - { platform: windows-x86_64, runner: windows-latest, target: x86_64-pc-windows-msvc  }
          - { platform: linux-x86_64,   runner: ubuntu-22.04,   target: x86_64-unknown-linux-gnu }

    steps:
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 1

      - name: Install Tauri system dependencies
        if: matrix.platform == 'linux-x86_64'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: pnpm/action-setup@v6.0.9
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: crates/gui/frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: crates/gui/frontend
        run: pnpm install --frozen-lockfile

      - uses: actions-rust-lang/setup-rust-toolchain@v1.11.0
        with:
          target: ${{ matrix.target }}
          cache: false

      - uses: Swatinem/rust-cache@v2.9.1

      - uses: cargo-bins/cargo-binstall@v1.20.1

      - name: Cache Tauri CLI
        id: cache-tauri-cli
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/bin/cargo-tauri
            ~/.cargo/bin/cargo-tauri.exe
          key: tauri-cli-2.11.2-${{ runner.os }}

      - name: Install Tauri CLI
        if: steps.cache-tauri-cli.outputs.cache-hit != 'true'
        run: cargo binstall tauri-cli --version "=2.11.2" --no-confirm

      - name: Build GUI installer
        id: tauri
        uses: tauri-apps/tauri-action@v0.5.20
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: crates/gui
          tauriScript: cargo tauri
          args: --target ${{ matrix.target }}

      - name: Rename and upload GUI artifacts
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ARTIFACT_PATHS: ${{ steps.tauri.outputs.artifactPaths }}
          TARGET: ${{ matrix.target }}
          TAG: ${{ github.ref_name }}
        run: |
          python3 << 'EOF'
          import json, os, shutil, subprocess

          paths = json.loads(os.environ['ARTIFACT_PATHS'])
          tag    = os.environ['TAG']
          target = os.environ['TARGET']
          version = tag.removeprefix('gui-v')

          def classify(path):
              if path.endswith('.app.tar.gz'):          return None  # updater bundle — not configured
              if path.endswith('.app.tar.gz.sig'):      return None
              if path.endswith('.AppImage.tar.gz'):     return None
              if path.endswith('.AppImage.tar.gz.sig'): return None
              if path.endswith('.nsis.zip'):            return None
              if path.endswith('.nsis.zip.sig'):        return None
              if path.endswith('.AppImage'):            return '.AppImage'
              if path.endswith('.dmg'):                 return '.dmg'
              if path.endswith('.exe'):                 return '.exe'
              if path.endswith('.msi'):                 return '.msi'
              if path.endswith('.deb'):                 return '.deb'
              if path.endswith('.rpm'):                 return '.rpm'
              return None

          for src in paths:
              ext = classify(src)
              if ext is None:
                  print(f'Skipping: {os.path.basename(src)}')
                  continue
              dst_name = f'hydra-gui-{version}-{target}{ext}'
              dst = os.path.join(os.path.dirname(src), dst_name)
              shutil.copy2(src, dst)
              subprocess.run(['gh', 'release', 'upload', tag, dst, '--clobber'], check=True)
              print(f'Uploaded: {dst_name}')
          EOF
