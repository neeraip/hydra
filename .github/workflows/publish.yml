name: Publish to crates.io

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    name: Publish crates
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      CARGO_TERM_COLOR: always

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1.11.0
        with:
          cache: false

      # hydra-common and hydra-engine have no internal dependencies —
      # publish them first, sequentially (crates.io enforces rate limits).
      - name: Publish hydra-common
        run: cargo publish -p hydra-common
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish hydra-engine
        run: cargo publish -p hydra-engine
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      # Wait for crates.io to index both crates before publishing the SDK,
      # which depends on hydra-engine.
      - name: Wait for crates.io to index
        run: sleep 30

      - name: Publish hydra-sdk
        run: cargo publish -p hydra-sdk
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      # Wait for crates.io to index hydra-sdk before publishing the CLI.
      - name: Wait for hydra-sdk to index
        run: sleep 30

      - name: Publish hydra-cli
        run: cargo publish -p hydra-cli
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
